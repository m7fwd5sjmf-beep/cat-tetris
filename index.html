<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#17131f">
<title>CAT TETRIS</title>
<style>
:root{--bg:#17131f;--panel:#251d31;--text:#fff8f1;--accent:#ffcf5c;--soft:#b9a9c9}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,#332641 0,#17131f 58%);color:var(--text);font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;overscroll-behavior:none}
body{display:flex;justify-content:center;touch-action:none}
.app{width:min(100%,760px);min-height:100dvh;padding:max(10px,env(safe-area-inset-top)) 12px max(12px,env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:10px}
header{display:flex;align-items:end;justify-content:space-between}
h1{font-size:clamp(22px,6vw,36px);line-height:1;margin:0;letter-spacing:.06em}
.sub{font-size:12px;color:var(--soft)}
.main{display:grid;grid-template-columns:minmax(0,1fr) 112px;gap:10px;align-items:start;justify-content:center}
.boardWrap{position:relative;background:#0d0a12;border:2px solid #6d5b80;border-radius:16px;padding:6px;box-shadow:0 16px 40px #0008}
canvas#game{display:block;width:100%;height:auto;aspect-ratio:1/2;border-radius:10px;background:#0b0810}
.overlay{position:absolute;inset:6px;display:flex;align-items:center;justify-content:center;background:#09070cc9;border-radius:10px;text-align:center;padding:20px}
.overlay[hidden]{display:none}
.overlayCard{background:#251d31e8;border:1px solid #88749c;border-radius:18px;padding:20px;width:min(90%,310px)}
.overlayCard h2{margin:0 0 8px;font-size:28px}
.overlayCard p{margin:0 0 14px;color:#d7c9e4}
.side{display:flex;flex-direction:column;gap:8px}
.card{background:linear-gradient(180deg,#2d233a,#21192a);border:1px solid #574866;border-radius:14px;padding:9px;box-shadow:0 8px 18px #0004}
.label{font-size:11px;color:var(--soft);letter-spacing:.08em}
.value{font-size:24px;font-weight:800}
#next{width:100%;height:auto;aspect-ratio:1;background:#0e0b12;border-radius:10px;margin-top:5px}
button{border:0;color:#fff;background:#5c496d;border-radius:14px;font:inherit;font-weight:800;box-shadow:inset 0 -3px 0 #0004;user-select:none}
button:active{transform:translateY(1px);filter:brightness(1.15)}
.primary{width:100%;padding:13px;background:linear-gradient(180deg,#ffb93e,#e7831f);color:#24160a}
.controls{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:auto}
.ctrl{min-height:58px;font-size:25px}
.ctrl.drop{background:#a33b70}
.hint{text-align:center;color:var(--soft);font-size:12px;padding:0 3px}
.version{font-size:10px;opacity:.65;margin-left:4px}
@media (max-width:430px){
 .app{padding-left:8px;padding-right:8px;gap:7px}
 .main{grid-template-columns:minmax(0,1fr) 88px;gap:7px}
 .card{padding:7px}
 .value{font-size:19px}
 .controls{gap:6px}
 .ctrl{min-height:54px;border-radius:12px}
}
</style>
</head>
<body>
<div class="app">
<header>
  <div><h1>CAT TETRIS</h1><div class="sub">猫画像が駒と一緒に回転します <span class="version">v2</span></div></div>
  <button id="pauseBtn" style="padding:9px 12px">一時停止</button>
</header>

<div class="main">
  <div class="boardWrap">
    <canvas id="game" width="300" height="600" aria-label="ゲーム画面"></canvas>
    <div class="overlay" id="overlay">
      <div class="overlayCard">
        <h2 id="overlayTitle">CAT TETRIS</h2>
        <p id="overlayText">猫の駒でラインをそろえよう！</p>
        <button class="primary" id="startBtn">ゲーム開始</button>
      </div>
    </div>
  </div>
  <aside class="side">
    <div class="card"><div class="label">SCORE</div><div class="value" id="score">0</div></div>
    <div class="card"><div class="label">LINES</div><div class="value" id="lines">0</div></div>
    <div class="card"><div class="label">LEVEL</div><div class="value" id="level">1</div></div>
    <div class="card"><div class="label">NEXT CAT</div><canvas id="next" width="120" height="120"></canvas></div>
  </aside>
</div>

<div class="controls">
  <button class="ctrl" data-action="left">◀</button>
  <button class="ctrl" data-action="rotate">↻</button>
  <button class="ctrl" data-action="down">▼</button>
  <button class="ctrl" data-action="right">▶</button>
  <button class="ctrl drop" data-action="drop">⇩</button>
</div>
<div class="hint">スワイプ：左右移動／下で落下　タップ：画像ごと回転　キーボードにも対応</div>
</div>

const COLORS={I:"#73d8ff",O:"#ffd95d",T:"#d58cff",L:"#ff9b55",J:"#6e9cff",S:"#7ddd8b",Z:"#ff6f7d"};

/* 画像の拡大率と位置。背景除去・余白トリミング済み画像を少し拡大して配置する。 */
const FIT={
 I:{zoom:1.035,x:.50,y:.50},
 O:{zoom:1.08,x:.50,y:.51},
 T:{zoom:1.055,x:.50,y:.51},
 L:{zoom:1.06,x:.50,y:.51},
 J:{zoom:1.08,x:.50,y:.50},
 S:{zoom:1.055,x:.50,y:.50},
 Z:{zoom:1.06,x:.50,y:.50}
};

const canvas=document.getElementById("game"), ctx=canvas.getContext("2d");
const nextCanvas=document.getElementById("next"), nctx=nextCanvas.getContext("2d");
const overlay=document.getElementById("overlay"), startBtn=document.getElementById("startBtn");
const scoreEl=document.getElementById("score"),linesEl=document.getElementById("lines"),levelEl=document.getElementById("level");
const imgs={}, spriteCache=new Map();
let loaded=0;
for(const t of TYPES){
  imgs[t]=new Image();
  imgs[t].src=CAT_IMAGES[t];
  imgs[t].onload=()=>{loaded++;spriteCache.clear();draw();drawNext();};
}

let board, current, nextType, bag=[], score=0, lines=0, level=1, playing=false, paused=false;
let last=0, dropAcc=0;

function emptyBoard(){return Array.from({length:ROWS},()=>Array(COLS).fill(null));}
function refillBag(){
  bag=TYPES.slice();
  for(let i=bag.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [bag[i],bag[j]]=[bag[j],bag[i]];
  }
}
function takeType(){if(!bag.length)refillBag();return bag.pop();}
function normalize(cells){
  const minX=Math.min(...cells.map(c=>c[0]));
  const minY=Math.min(...cells.map(c=>c[1]));
  return cells.map(([x,y])=>[x-minX,y-minY]);
}
function rotateCellsCW(cells){return normalize(cells.map(([x,y])=>[-y,x]));}
const rotationCache={};
function getCells(type,rot){
  const key=type+"-"+(rot&3);
  if(rotationCache[key])return rotationCache[key].map(p=>p.slice());
  let cells=BASE_SHAPES[type].map(p=>p.slice());
  for(let i=0;i<(rot&3);i++)cells=rotateCellsCW(cells);
  rotationCache[key]=cells.map(p=>p.slice());
  return cells;
}
function pieceBounds(cells){
  const xs=cells.map(c=>c[0]),ys=cells.map(c=>c[1]);
  const minX=Math.min(...xs),minY=Math.min(...ys),maxX=Math.max(...xs),maxY=Math.max(...ys);
  return{minX,minY,w:maxX-minX+1,h:maxY-minY+1};
}
function roundedCellPath(c,x,y,size){
  const inset=Math.max(.7,size*.025);
  const r=Math.max(2,size*.12);
  c.roundRect(x+inset,y+inset,size-inset*2,size-inset*2,r);
}
function drawImageCover(c,img,w,h,fit){
  if(!(img&&img.complete&&img.naturalWidth))return false;
  const scale=Math.max(w/img.naturalWidth,h/img.naturalHeight)*fit.zoom;
  const dw=img.naturalWidth*scale,dh=img.naturalHeight*scale;
  const dx=(w-dw)*fit.x,dy=(h-dh)*fit.y;
  c.drawImage(img,dx,dy,dw,dh);
  return true;
}

/*
  0度の猫画像をテトリミノ形状でマスクし、
  その完成画像全体を90度単位で回転させる。
  これにより形状だけでなく、猫の顔・体・毛並みも駒へ追従して回転する。
*/
function createSprite(type,rot,cellSize){
  const cell=Math.max(1,Math.round(cellSize*100)/100);
  const key=`${type}-${rot&3}-${cell}`;
  if(spriteCache.has(key))return spriteCache.get(key);

  const baseCells=getCells(type,0);
  const baseBounds=pieceBounds(baseCells);
  const bw=Math.round(baseBounds.w*cell),bh=Math.round(baseBounds.h*cell);
  const base=document.createElement("canvas");
  base.width=bw;base.height=bh;
  const bctx=base.getContext("2d");

  bctx.save();
  bctx.beginPath();
  for(const [x,y] of baseCells)roundedCellPath(bctx,x*cell,y*cell,cell);
  bctx.clip();

  const bg=bctx.createLinearGradient(0,0,bw,bh);
  bg.addColorStop(0,COLORS[type]);
  bg.addColorStop(1,"#21182b");
  bctx.fillStyle=bg;
  bctx.fillRect(0,0,bw,bh);

  drawImageCover(bctx,imgs[type],bw,bh,FIT[type]);

  const shine=bctx.createLinearGradient(0,0,0,bh);
  shine.addColorStop(0,"#ffffff1f");
  shine.addColorStop(.55,"#ffffff00");
  shine.addColorStop(1,"#00000035");
  bctx.fillStyle=shine;bctx.fillRect(0,0,bw,bh);
  bctx.restore();

  bctx.strokeStyle="#ffffffc4";
  bctx.lineWidth=Math.max(1,cell*.045);
  for(const [x,y] of baseCells){
    bctx.beginPath();
    roundedCellPath(bctx,x*cell,y*cell,cell);
    bctx.stroke();
  }

  const r=rot&3;
  if(r===0){spriteCache.set(key,base);return base;}

  const out=document.createElement("canvas");
  if(r%2){out.width=bh;out.height=bw;}else{out.width=bw;out.height=bh;}
  const o=out.getContext("2d");
  if(r===1){o.translate(out.width,0);o.rotate(Math.PI/2);}
  else if(r===2){o.translate(out.width,out.height);o.rotate(Math.PI);}
  else{o.translate(0,out.height);o.rotate(-Math.PI/2);}
  o.drawImage(base,0,0);
  spriteCache.set(key,out);
  return out;
}
function drawSettledCell(c,px,py,size,b){
  const sprite=createSprite(b.type,b.rot,size);
  c.drawImage(sprite,b.lx*size,b.ly*size,size,size,px,py,size,size);
}

function spawn(){
  const type=nextType||takeType();
  nextType=takeType();
  current={type,rot:0,cells:getCells(type,0),x:3,y:0};
  const b=pieceBounds(current.cells);
  current.x=Math.floor((COLS-b.w)/2);
  drawNext();
  if(collides(current,0,0,current.cells))gameOver();
}
function collides(p,dx,dy,cells=p.cells){
  return cells.some(([x,y])=>{
    const nx=p.x+x+dx,ny=p.y+y+dy;
    return nx<0||nx>=COLS||ny>=ROWS||(ny>=0&&board[ny][nx]);
  });
}
function move(dx,dy){
  if(!playing||paused)return false;
  if(!collides(current,dx,dy)){
    current.x+=dx;current.y+=dy;draw();return true;
  }
  if(dy>0)lockPiece();
  return false;
}
function rotate(){
  if(!playing||paused)return;
  const newRot=(current.rot+1)&3;
  const newCells=getCells(current.type,newRot);
  for(const [kx,ky] of [[0,0],[-1,0],[1,0],[-2,0],[2,0],[0,-1]]){
    if(!collides(current,kx,ky,newCells)){
      current.rot=newRot;
      current.cells=newCells;
      current.x+=kx;current.y+=ky;
      draw();return;
    }
  }
}
function hardDrop(){
  if(!playing||paused)return;
  let d=0;
  while(!collides(current,0,d+1))d++;
  current.y+=d;score+=d*2;lockPiece();
}
function lockPiece(){
  if(!playing)return;
  for(const [x,y] of current.cells){
    const nx=current.x+x,ny=current.y+y;
    if(ny<0){gameOver();return;}
    board[ny][nx]={type:current.type,rot:current.rot,lx:x,ly:y};
  }
  clearLines();spawn();updateUI();draw();
}
function clearLines(){
  let n=0;
  for(let y=ROWS-1;y>=0;y--){
    if(board[y].every(Boolean)){
      board.splice(y,1);
      board.unshift(Array(COLS).fill(null));
      n++;y++;
    }
  }
  if(n){
    score+=[0,100,300,500,800][n]*level;
    lines+=n;
    level=1+Math.floor(lines/10);
  }
}
function dropMs(){return Math.max(90,800-(level-1)*65);}
function startGame(){
  board=emptyBoard();bag=[];score=0;lines=0;level=1;nextType=takeType();
  playing=true;paused=false;overlay.hidden=true;
  document.getElementById("pauseBtn").textContent="一時停止";
  spawn();updateUI();draw();last=performance.now();dropAcc=0;
  requestAnimationFrame(loop);
}
function gameOver(){
  playing=false;overlay.hidden=false;
  document.getElementById("overlayTitle").textContent="GAME OVER";
  document.getElementById("overlayText").textContent=`スコア ${score}　消したライン ${lines}`;
  startBtn.textContent="もう一度遊ぶ";
}
function togglePause(){
  if(!playing)return;
  paused=!paused;
  document.getElementById("pauseBtn").textContent=paused?"再開":"一時停止";
  if(paused){
    overlay.hidden=false;
    document.getElementById("overlayTitle").textContent="PAUSE";
    document.getElementById("overlayText").textContent="猫もひと休み中";
    startBtn.textContent="再開";
  }else{
    overlay.hidden=true;last=performance.now();requestAnimationFrame(loop);
  }
}
function loop(t){
  if(!playing||paused)return;
  const dt=Math.min(50,t-last);last=t;dropAcc+=dt;
  if(dropAcc>=dropMs()){dropAcc=0;move(0,1);}
  draw();requestAnimationFrame(loop);
}
function updateUI(){scoreEl.textContent=score;linesEl.textContent=lines;levelEl.textContent=level;}

function draw(){
  const W=canvas.width,H=canvas.height,cell=W/COLS;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle="#0b0810";ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="#ffffff0b";ctx.lineWidth=1;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*cell,0);ctx.lineTo(x*cell,H);ctx.stroke();}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*cell);ctx.lineTo(W,y*cell);ctx.stroke();}

  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    const b=board[y][x];
    if(b)drawSettledCell(ctx,x*cell,y*cell,cell,b);
  }

  if(current&&playing){
    let ghostY=current.y;
    while(!collides(current,0,ghostY-current.y+1))ghostY++;
    ctx.save();ctx.globalAlpha=.16;ctx.fillStyle="#fff";
    for(const [x,y] of current.cells){
      ctx.beginPath();roundedCellPath(ctx,(current.x+x)*cell,(ghostY+y)*cell,cell);ctx.fill();
    }
    ctx.restore();

    const sprite=createSprite(current.type,current.rot,cell);
    ctx.drawImage(sprite,current.x*cell,current.y*cell);
  }
}
function drawNext(){
  nctx.clearRect(0,0,nextCanvas.width,nextCanvas.height);
  nctx.fillStyle="#0e0b12";nctx.fillRect(0,0,nextCanvas.width,nextCanvas.height);
  if(!nextType)return;
  const b=pieceBounds(getCells(nextType,0));
  const size=Math.min(28,92/Math.max(b.w,b.h));
  const sprite=createSprite(nextType,0,size);
  const ox=(nextCanvas.width-sprite.width)/2;
  const oy=(nextCanvas.height-sprite.height)/2;
  nctx.drawImage(sprite,ox,oy);
}

startBtn.addEventListener("click",()=>{if(paused)togglePause();else startGame();});
document.getElementById("pauseBtn").addEventListener("click",togglePause);
function action(a){
  ({
    left:()=>move(-1,0),
    right:()=>move(1,0),
    down:()=>{if(move(0,1))score++;updateUI();},
    rotate,
    drop:hardDrop
  }[a]||(()=>{}))();
}
document.querySelectorAll("[data-action]").forEach(b=>{
  let timer,interval;
  const begin=e=>{
    e.preventDefault();action(b.dataset.action);
    if(["left","right","down"].includes(b.dataset.action)){
      timer=setTimeout(()=>interval=setInterval(()=>action(b.dataset.action),80),220);
    }
  };
  const end=()=>{clearTimeout(timer);clearInterval(interval);};
  b.addEventListener("pointerdown",begin);
  b.addEventListener("pointerup",end);
  b.addEventListener("pointercancel",end);
  b.addEventListener("pointerleave",end);
});
addEventListener("keydown",e=>{
  const map={ArrowLeft:"left",ArrowRight:"right",ArrowDown:"down",ArrowUp:"rotate"," ":"drop",x:"rotate",z:"rotate"};
  if(map[e.key]){e.preventDefault();action(map[e.key]);}
  if(e.key==="p"||e.key==="Escape")togglePause();
});
let sx=0,sy=0,st=0;
canvas.addEventListener("pointerdown",e=>{sx=e.clientX;sy=e.clientY;st=Date.now();});
canvas.addEventListener("pointerup",e=>{
  const dx=e.clientX-sx,dy=e.clientY-sy,ax=Math.abs(dx),ay=Math.abs(dy);
  if(ax<18&&ay<18&&Date.now()-st<350){rotate();return;}
  if(ax>ay){
    const n=Math.max(1,Math.round(ax/35));
    for(let i=0;i<n;i++)move(dx>0?1:-1,0);
  }else if(dy>25){
    if(dy>110)hardDrop();else move(0,1);
  }
});

board=emptyBoard();draw();drawNext();
</script>
</body>
</html>
